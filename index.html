<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetter Östringen</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

#wrapper{
width:355px;
height:68px;
padding:4px;
box-sizing:border-box;

background-image:url("https://i.ibb.co/Jj5VHVzY/Vorlage-Divera-Ticker-5.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

#weather{
font-size:18px;
font-weight:bold;
text-shadow:0 0 10px rgba(0,0,0,0.8);
}

</style>

</head>

<body>

<div id="wrapper">

<div id="weather">Wetter lädt...</div>

</div>

<script>

async function loadWeather(){

try{

const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=49.21&longitude=8.71&current_weather=true");
const data = await response.json();

const temp = data.current_weather.temperature;

document.getElementById("weather").textContent =
`🌤 ${temp}°C Tiefenbach`;

}catch{

document.getElementById("weather").textContent =
"Wetter nicht verfügbar";

}

}

loadWeather();
setInterval(loadWeather,600000);

</script>

</body>

</html>
