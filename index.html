<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetter Östringen</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

#wrapper{
width:355px;
height:68px;
padding:4px;
box-sizing:border-box;

background-image:url("https://i.ibb.co/Jj5VHVzY/Vorlage-Divera-Ticker-5.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

#weather{
font-size:19px;
font-weight:bold;
text-shadow:0 0 10px rgba(0,0,0,0.8);
}

</style>

</head>

<body>

<div id="wrapper">
<div id="weather">Wetter lädt...</div>
</div>

<script>

function getWeatherDescription(code){

if(code === 0) return "☀️ Sonnig";
if(code === 1 || code === 2) return "🌤 Bewölkt";
if(code === 3) return "☁️ Bewölkt";

if(code === 45 || code === 48) return "🌫 Nebel";

if(code >= 51 && code <= 67) return "🌧 Regen";

if(code >= 71 && code <= 77) return "❄️ Schnee";

if(code >= 80 && code <= 82) return "🌧 Regen";

if(code >= 95) return "⛈ Gewitter";

return "🌤 Wetter";

}

async function loadWeather(){

try{

const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=49.21&longitude=8.71&current_weather=true");
const data = await response.json();

const temp = data.current_weather.temperature;
const code = data.current_weather.weathercode;

const weatherText = getWeatherDescription(code);

document.getElementById("weather").textContent =
`${weatherText} ${temp}°C Tiefenbach`;

}catch{

document.getElementById("weather").textContent =
"Wetter nicht verfügbar";

}

}

loadWeather();
setInterval(loadWeather,600000);

</script>

</body>
</html>
